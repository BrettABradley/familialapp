    <style>
      /* Pin the page background before CSS loads so the splash → app handoff
         never reveals a black/transparent frame. Respects system dark mode. */
      html, body { background-color: #ffffff; margin: 0; }

      /* Full-screen HTML splash overlay — paints with the first WebView
         frame so the native splash hands off into a matching screen with
         the logo centered (no black flash). React fades it out after ~2.5s. */
      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2147483647;
        transition: opacity 700ms ease;
        opacity: 1;
      }
      #splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash-logo {

        height: 140px;
        object-fit: contain;
      }

      @media (prefers-color-scheme: dark) {

  <body>
    <div id="splash"><img class="splash-logo" src="/splash-logo.png" alt="" aria-hidden="true" /></div>
    <div id="root"></div>
    <script>
      // EARLY auth-token interceptor — runs before the module script imports
      // supabase-js (whose createClient auto-consumes tokens from the URL
      // via detectSessionInUrl). Two cases:
      //  1) Hash-style tokens (#access_token=...) on any non-callback path:
      //     hard-redirect to /auth/callback so the browser never auto-signs.
      //  2) PKCE code (?code=...) on /auth/callback: strip it from the URL
      //     and stash it in sessionStorage, so supabase-js sees a clean URL
      //     on boot and never exchanges the code into a session. The
      //     AuthCallback page reads the stash for error reporting only.
      (function () {
        try {
          var hash = window.location.hash || "";
          var search = window.location.search || "";
          var path = window.location.pathname || "/";
          var isAuthLanding =
            path === "/auth/callback" || path === "/reset-password";
          var looksLikeAuthHash =
            /access_token=/.test(hash) ||
            /type=signup/.test(hash) ||
            /type=recovery/.test(hash) ||
            /type=invite/.test(hash) ||
            /type=magiclink/.test(hash);

          if (!isAuthLanding && looksLikeAuthHash) {
            var isRecovery = /type=recovery/.test(hash) || /type=recovery/.test(search);
            var target = isRecovery ? "/reset-password" : "/auth/callback";
            window.location.replace(target + search + hash);
            return;
          }

          // PKCE code landed on /auth/callback — strip before supabase-js boots
          if (path === "/auth/callback" && /[?&]code=/.test(search)) {
            try {
              sessionStorage.setItem(
                "familial:pendingVerifyParams",
                JSON.stringify({ search: search, hash: hash })
              );
            } catch (e) { /* non-fatal */ }
            window.history.replaceState({}, "", "/auth/callback");
          }
        } catch (e) {
          // non-fatal
          console && console.warn && console.warn("[boot] auth interceptor failed", e);
        }
      })();
    </script>

    <script>
      // Safety net: if React fails to mount for any reason, force the
      // splash overlay to fade out after 5s so users never see a frozen
      // white screen.
      setTimeout(function () {
        var s = document.getElementById("splash");
        if (s && !s.classList.contains("splash-hide")) {
          s.classList.add("splash-hide");
          setTimeout(function () { s && s.parentNode && s.parentNode.removeChild(s); }, 800);
        }
      }, 5000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
